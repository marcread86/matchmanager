# Wrangler config — only needed if you want to run `wrangler pages dev` locally
# or manage D1 from the CLI. The Cloudflare dashboard UI can do everything
# this file does, so you can delete it if you prefer clicking through the UI.

name = "mpb-rangers"
compatibility_date = "2024-09-01"
pages_build_output_dir = "."

# Bind the D1 database to env.DB inside Pages Functions.
# Create the DB first: wrangler d1 create mpb-rangers
# Then copy the printed database_id into here.
[[d1_databases]]
binding = "DB"
database_name = "mpb-rangers"
database_id = "REPLACE_ME_WITH_D1_DATABASE_ID"

# Optional — exposes the Access team domain to /api/me so it can build a
# correct logout URL. Set in Pages → Settings → Environment variables OR
# uncomment here.
# [vars]
# ACCESS_TEAM_DOMAIN = "your-team.cloudflareaccess.com"
